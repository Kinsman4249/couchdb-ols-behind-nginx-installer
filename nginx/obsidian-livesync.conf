# Obsidian Self-hosted LiveSync -> local CouchDB. SNI vhost on 443.
# @@DOMAIN@@, @@SSL_CERT@@, @@SSL_KEY@@ and @@EXTRA_INCLUDES@@ are filled in
# by the installer at runtime.
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name @@DOMAIN@@;

    # Optional extra includes (origin lockdown, real-ip, mTLS, etc.) that you
    # supplied at install time are inserted on the next line. Empty if none.
@@EXTRA_INCLUDES@@
    server_tokens off;

    ssl_certificate     @@SSL_CERT@@;
    ssl_certificate_key @@SSL_KEY@@;
    ssl_session_cache   shared:ssl_session_cache:10m;
    ssl_session_timeout 5m;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # HSTS scoped to this host only (no includeSubDomains).
    add_header Strict-Transport-Security "max-age=31536000" always;

    # Let CouchDB (and any upstream proxy) govern payload size.
    client_max_body_size 0;

    # CORS is handled entirely by CouchDB (set by couchdb-init.sh).
    # Do NOT add CORS headers here or replication breaks.

    location / {
        limit_req zone=ols_couch burst=90 nodelay;

        proxy_pass         http://127.0.0.1:5984;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
