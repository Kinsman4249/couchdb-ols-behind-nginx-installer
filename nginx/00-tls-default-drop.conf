# Catch-all for unknown SNI / raw-IP hits on 443. Add only if this box has no
# other 443 default_server. Requires the ssl-cert package (snakeoil cert).
server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    http2 on;
    server_name _;

    ssl_certificate     /etc/ssl/certs/ssl-cert-snakeoil.pem;
    ssl_certificate_key /etc/ssl/private/ssl-cert-snakeoil.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    return 444;
}
